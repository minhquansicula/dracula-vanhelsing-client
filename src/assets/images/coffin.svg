<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9c4dcc"></stop>
      <stop offset="100%" stop-color="#5a148c"></stop>
    </radialGradient>

    <linearGradient id="coffin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3a6ff"></stop>
      <stop offset="100%" stop-color="#7b1fa2"></stop>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="100" fill="url(#bg)" filter="url(#shadow)"></circle>

  <polygon points="128,60 175,95 175,165 128,200 81,165 81,95" fill="url(#coffin)"></polygon>

  <!-- Cross glow -->
  <rect x="118" y="95" width="20" height="70" fill="#66ffff"></rect>
  <rect x="95" y="120" width="66" height="20" fill="#66ffff"></rect>
</svg>